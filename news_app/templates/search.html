{% extends 'base.html' %}

{% block title %}Search{% endblock %}

{% block content %}
        <section class="news-block">
            <div class="container-fluid">
                <div class="news-block__content">
                    <h3>Search</h3>
                    <form action="{% url 'search_results' %}" method="get">
                        <label for="search">Enter news title or description</label>
                        <input id="search" name="q" type="text" placeholder="Title or Description" required>
                        <button type="submit">Search</button>
                    </form>
                </div>
                <div class="news-block__adv">
                    <h3>Advertising</h3>
                      <div class="news-adv__card">

                       <img src="https://tengrinews.kz/userdata/news/2026/news_593697/thumb_b/photo_536902.jpg.webp" alt="" class="news-adv_img">
                          <img src="https://tengrinews.kz/userdata/news/2026/news_593697/thumb_b/photo_536902.jpg.webp" alt="" class="news-adv_img">
                           <img src="https://tengrinews.kz/userdata/news/2026/news_593697/thumb_b/photo_536902.jpg.webp" alt="" class="news-adv_img">
                            <img src="https://tengrinews.kz/userdata/news/2026/news_593697/thumb_b/photo_536902.jpg.webp" alt="" class="news-adv_img">

                    </div>
                </div>
            </div>
        </section>
{% endblock %}
